<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>医院数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.2/dist/echarts.min.js"></script>
  <style>
    .chart-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px;
    }
    .chart {
      width: 600px;
      height: 400px;
      border: 1px solid #eee;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>学生各科成绩分析</h1>
  <div class="chart-container">
    <div id="chineseChart" class="chart"></div>
    <div id="mathChart" class="chart"></div>
    <div id="englishChart" class="chart"></div>
  </div>


  <script>
    // 初始化所有图表
    const chineseChart = echarts.init(document.getElementById('chineseChart'));
    const mathChart = echarts.init(document.getElementById('mathChart'));
    const englishChart = echarts.init(document.getElementById('englishChart'));
  

    // 从后端获取数据
    fetch('http://localhost:3000/data')
      .then(response => response.json())
      .then(data => {
        // 提取共用数据
        const studentNames = data.map(item => item.student_name);
        
        // 语文成绩图表配置
        chineseChart.setOption({
          title: { text: '语文成绩分布', left: 'center' },
          tooltip: { trigger: 'axis' },
          xAxis: { 
            type: 'category', 
            data: studentNames,
            axisLabel: { rotate: 45 }
          },
          yAxis: { 
            type: 'value',
            name: '分数',
            max: 100,
            min: 0
          },
          series: [{
            name: '语文',
            type: 'line',
            data: data.map(item => item.Chinese_score),
            itemStyle: { color: '#FF6384' },
            label: {
              show: true,
              position: 'top'
            }
          }]
        });

        // 数学成绩图表配置
        mathChart.setOption({
          title: { text: '数学成绩分布', left: 'center' },
          tooltip: { trigger: 'axis' },
          xAxis: { 
            type: 'category', 
            data: studentNames,
            axisLabel: { rotate: 45 }
          },
          yAxis: { 
            type: 'value',
            name: '分数',
            max: 100,
            min: 0
          },
          series: [{
            name: '数学',
            type: 'line',
            data: data.map(item => item.Math_score),
            itemStyle: { color: '#36A2EB' },
            label: {
              show: true,
              position: 'top'
            },
            smooth: true
          }]
        });

        // 英语成绩图表配置
        englishChart.setOption({
          title: { text: '平均成绩分布', left: 'center' },
          tooltip: { trigger: 'axis' },
          xAxis: { 
            type: 'category', 
            data: studentNames,
            axisLabel: { rotate: 45 }
          },
          yAxis: { 
            type: 'value',
            name: '分数',
            max: 100,
            min: 0
          },
          series: [{
            name: '平均成绩',
            type: 'bar',
            data: data.map(item => item.average_score),
            itemStyle: { color: '#4BC0C0' },
            label: {
              show: true,
              position: 'top'
            }
          }]
        });
      });



    // 窗口大小变化时重新调整图表大小
    window.addEventListener('resize', function() {
      chineseChart.resize();
      mathChart.resize();
      englishChart.resize();
 
    });
  </script>
</body>
</html>
