<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠医学平台 - 患者工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1a2a6c 0%, #2c3e50 100%);
            color: white;
            padding: 20px 0;
        }
        
        .logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
            color: #3498db;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-profile {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #3498db;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 30px;
            color: white;
        }
        
        .user-name {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .user-role {
            font-size: 14px;
            color: #bbb;
        }
        
        .menu {
            list-style: none;
        }
        
        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .menu-item:hover, .menu-item.active {
            background-color: rgba(52, 152, 219, 0.2);
            border-left: 4px solid #3498db;
        }
        
        .menu-item i {
            margin-right: 12px;
            font-size: 18px;
        }
        
        /* 主内容区样式 */
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
        }
        
        .notification {
            position: relative;
            margin-right: 20px;
            font-size: 20px;
            color: #7f8c8d;
            cursor: pointer;
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .user-menu-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #3498db;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 10px;
        }
        
        /* 仪表盘样式 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .card-action {
            color: #3498db;
            cursor: pointer;
            font-size: 14px;
        }
        
        .sleep-score {
            text-align: center;
            padding: 20px 0;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #2c3e50;
            margin: 10px 0;
        }
        
        .score-label {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .score-trend {
            color: #2ecc71;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            background-color: #f8f9fa;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .reminders-list {
            list-style: none;
        }
        
        .reminder-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .reminder-item:last-child {
            border-bottom: none;
        }
        
        .reminder-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(52, 152, 219, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: #3498db;
        }
        
        .reminder-content {
            flex: 1;
        }
        
        .reminder-title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .reminder-time {
            font-size: 13px;
            color: #7f8c8d;
        }
        
        /* 睡眠趋势图 */
        .sleep-trend {
            margin-top: 30px;
        }
        
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }
        
        .chart-placeholder {
            height: 300px;
            background: linear-gradient(45deg, #f5f7fa 25%, #e4e9f2 25%, #e4e9f2 50%, #f5f7fa 50%, #f5f7fa 75%, #e4e9f2 75%, #e4e9f2 100%);
            background-size: 20px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 16px;
        }
        
        /* 响应式设计 */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">💤</div>
                <div class="logo-text">睡眠医学平台</div>
            </div>
            
            <div class="user-profile">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-name">张小明</div>
                <div class="user-role">患者</div>
            </div>
            
            <ul class="menu">
                <li class="menu-item active">
                    <i class="fas fa-home"></i>
                    <span>工作台</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-bed"></i>
                    <span>睡眠记录</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>睡眠报告</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>我的计划</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-bell"></i>
                    <span>提醒通知</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-user-md"></i>
                    <span>医生咨询</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-book"></i>
                    <span>健康知识</span>
                </li>
                <li class="menu-item">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1 class="page-title">患者工作台</h1>
                <div class="header-actions">
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>
                    <div class="user-menu">
                        <div class="user-menu-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span>张小明</span>
                    </div>
                </div>
            </div>
            
            <!-- 仪表盘 -->
            <div class="dashboard">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">睡眠评分</h2>
                        <span class="card-action">详情</span>
                    </div>
                    <div class="sleep-score">
                        <div class="score-label">昨日睡眠质量</div>
                        <div class="score-value">82</div>
                        <div class="score-trend">
                            <i class="fas fa-arrow-up"></i> 较前日提高5分
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">睡眠数据</h2>
                        <span class="card-action">历史</span>
                    </div>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">7h 28m</div>
                            <div class="stat-label">睡眠时长</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">92%</div>
                            <div class="stat-label">睡眠效率</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">3</div>
                            <div class="stat-label">醒来次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">1h 15m</div>
                            <div class="stat-label">深睡时长</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">今日提醒</h2>
                        <span class="card-action">全部</span>
                    </div>
                    <ul class="reminders-list">
                        <li class="reminder-item">
                            <div class="reminder-icon">
                                <i class="fas fa-pills"></i>
                            </div>
                            <div class="reminder-content">
                                <div class="reminder-title">服用 melatonin 2mg</div>
                                <div class="reminder-time">晚上 9:30</div>
                            </div>
                        </li>
                        <li class="reminder-item">
                            <div class="reminder-icon">
                                <i class="fas fa-running"></i>
                            </div>
                            <div class="reminder-content">
                                <div class="reminder-title">睡前放松运动</div>
                                <div class="reminder-time">晚上 8:00</div>
                            </div>
                        </li>
                        <li class="reminder-item">
                            <div class="reminder-icon">
                                <i class="fas fa-stethoscope"></i>
                            </div>
                            <div class="reminder-content">
                                <div class="reminder-title">与李医生随访</div>
                                <div class="reminder-time">明天 上午 10:00</div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
            
            <!-- 睡眠趋势图 -->
            <div class="sleep-trend">
                <div class="chart-container">
                    <div class="card-header">
                        <h2 class="card-title">近7天睡眠趋势</h2>
                        <span class="card-action">导出报告</span>
                    </div>
                    <div class="chart-placeholder">
                        <i class="fas fa-chart-area"></i>
                        <span>睡眠质量趋势图表</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的菜单交互
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                // 在实际应用中，这里会加载相应的页面内容
                const pageTitle = this.querySelector('span').textContent;
                document.querySelector('.page-title').textContent = pageTitle;
            });
        });
        
        // 模拟通知功能
        document.querySelector('.notification').addEventListener('click', function() {
            alert('您有3条未读通知：\n1. 李医生更新了您的治疗方案\n2. 本周睡眠报告已生成\n3. 明天上午10点有随访预约');
        });
    </script>
</body>
</html>
