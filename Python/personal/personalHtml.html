<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人项目资源</title>
    <style>
        :root {
            --bg: #f4f8ff;
            --card: #ffffff;
            --text: #333;
            --muted: #666;
            --accent: #0078d7;
            --radius: 14px;
            --shadow: 0 6px 18px rgba(26, 63, 125, 0.12);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(145deg, #e3edff 0%, #f9fbff 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .container {
            width: min(900px, 100%);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }
        h1 {
            margin-top: 0;
            color: #1f4d9f;
            text-align: center;
        }
        p.description {
            color: var(--muted);
            text-align: center;
            margin: 8px 0 24px;
        }
        .card {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            align-items: center;
            padding: 18px;
            border: 1px solid #edf2fa;
            border-radius: 12px;
            background: #fff;
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #dbe7f7;
        }
        .card .info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card .info a {
            color: #ffffff;
            text-decoration: none;
            display: inline-block;
            background: var(--accent);
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 600;
            transition: background 0.2s ease;
        }
        .card .info a:hover {
            background: #005bb5;
        }
        .card .info .detail {
            color: var(--muted);
        }
        @media (max-width: 780px) {
            .card {
                grid-template-columns: 1fr;
            }
            .card img {
                max-height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>项目资源汇总</h1>
        <!-- <p class="description">一处查看你项目链接、文档与预览图，提升展示效果。</p> -->

        <div class="card">
            <div class="info">
                <h2>项目名称：个人作品集</h2>
                <p class="detail">项目描述：展示个人技能、项目案例、前端页面与数据可视化练习。</p>
                <div>
                    <a href="https://github.com/Augenstern394/diabetes.git" target="_blank" rel="noopener">访问项目仓库</a>
                </div>
                <!-- <div>
                    <a href="https://github.com/USERNAME/REPO/raw/main/项目文档.docx" target="_blank" rel="noopener">下载项目文档（DOCX）</a>
                </div> -->
            </div>
            
        </div>
        <img src="./image.png" />
        <!-- <p style="margin-top:18px;color:#4a4a4a;">提示：将链接地址替换为你的实际地址，图片路径填入项目中实际文件路径。</p> -->
    </div>
</body>
</html>
