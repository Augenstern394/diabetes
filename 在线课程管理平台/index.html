<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线课程管理平台</title>
    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> -->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <!-- 首页展示 -->
        <div id="home">
            <div id="carousel" class="carousel slide" data-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="../二次元翻滚/img/01.gif" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="../二次元翻滚/img/04.gif" class="d-block w-100" alt="...">
                    </div>
                </div>
                <a class="carousel-control-prev" href="#carousel" role="button" data-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next" href="#carousel" role="button" data-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                </a>
            </div>
            <div id="menu" class="mt-4">
                <!-- 三级菜单 -->
            </div>
            <div id="tabs" class="mt-4">
                <!-- 选项卡 -->
            </div>
            <div id="date-picker" class="mt-4">
                <!-- 日期组件 -->
            </div>
        </div>

        <!-- 课程详情页 -->
        <div id="course-detail" class="mt-5" style="display: none;">
            <!-- 课程详情内容 -->
        </div>
    </div>

    <!-- <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> -->
    <!-- <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script> -->
    <script src="app.js"></script>
</body>

</html>
